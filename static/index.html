<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 车辆故障知识库</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            color: #333;
        }
        .header {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white;
            padding: 24px 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .header h1 { font-size: 24px; font-weight: 600; }
        .header p { font-size: 14px; opacity: 0.85; margin-top: 4px; }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 16px;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            padding: 24px;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .upload-area {
            border: 2px dashed #d0d5dd;
            border-radius: 8px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-area:hover { border-color: #1a73e8; background: #f8faff; }
        .upload-area.dragover { border-color: #1a73e8; background: #e8f0fe; }
        .upload-area input[type="file"] { display: none; }
        .upload-area .icon { font-size: 40px; color: #1a73e8; }
        .upload-area .text { color: #666; margin-top: 8px; font-size: 14px; }
        .upload-area .hint { color: #999; font-size: 12px; margin-top: 4px; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-primary:hover { background: #1557b0; }
        .btn-primary:disabled { background: #a0c4ff; cursor: not-allowed; }
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 14px;
            display: none;
        }
        .status-bar.loading { display: flex; background: #e8f0fe; color: #1a73e8; }
        .status-bar.success { display: flex; background: #e6f7e6; color: #1b7e1b; }
        .status-bar.error { display: flex; background: #ffe6e6; color: #c62828; }
        .status-bar .spinner {
            width: 16px; height: 16px;
            border: 2px solid #1a73e8; border-top-color: transparent;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .chat-box {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            background: #fafafa;
        }
        .chat-box .empty {
            text-align: center;
            color: #bbb;
            font-size: 14px;
            margin-top: 140px;
        }
        .msg { margin-bottom: 16px; display: flex; }
        .msg.user { justify-content: flex-end; }
        .msg .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
        }
        .msg.user .bubble {
            background: #1a73e8;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg.ai .bubble {
            background: white;
            border: 1px solid #e8e8e8;
            border-bottom-left-radius: 4px;
        }
        .msg .label {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
            padding: 0 4px;
        }
        .input-row {
            display: flex;
            gap: 8px;
        }
        .input-row input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #d0d5dd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }
        .input-row input:focus { border-color: #1a73e8; }
        .input-row input:disabled { background: #f5f5f5; }
        .quick-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }
        .quick-questions .chip {
            padding: 5px 12px;
            border-radius: 16px;
            border: 1px solid #d0d5dd;
            background: white;
            font-size: 12px;
            color: #555;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .quick-questions .chip:hover {
            border-color: #1a73e8;
            color: #1a73e8;
            background: #f0f6ff;
        }
        .quick-questions .chip:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .ref-link {
            font-size: 12px;
            color: #1a73e8;
            cursor: pointer;
            margin-top: 4px;
            display: inline-block;
        }
        .ref-link:hover { text-decoration: underline; }
        .info-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            background: #e8f0fe;
            color: #1a73e8;
            margin-right: 4px;
        }
        .footer {
            text-align: center;
            color: #999;
            font-size: 12px;
            padding: 20px 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚗 AI 车辆故障知识库</h1>
        <p>上传维修手册 → 提问 → AI 基于手册内容回答</p>
    </div>

    <div class="container">

        <!-- 上传区域 -->
        <div class="card">
            <div class="card-title">📄 1. 上传车辆维修手册（PDF）</div>
            <div class="upload-area" id="uploadArea">
                <div class="icon">📂</div>
                <div class="text">点击选择 PDF 文件，或拖拽到此处</div>
                <div class="hint">支持 .pdf 格式</div>
                <input type="file" id="fileInput" accept=".pdf">
            </div>
            <div class="status-bar" id="uploadStatus">
                <span class="spinner" id="uploadSpinner"></span>
                <span id="uploadMsg">处理中...</span>
            </div>
            <div style="margin-top:12px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                <span class="info-badge" id="indexBadge" style="display:none;">📚 索引已加载</span>
                <span class="info-badge" id="chunkBadge" style="display:none;">📝 0 个文本块</span>
            </div>
        </div>

        <!-- 问答区域 -->
        <div class="card">
            <div class="card-title">💬 2. 提问</div>
            <div class="chat-box" id="chatBox">
                <div class="empty">👋 上传 PDF 后，在这里提问即可获取 AI 回答</div>
            </div>
            <div class="input-row">
                <input type="text" id="queryInput" placeholder="例如：发动机故障灯亮了怎么办？" disabled>
                <button class="btn btn-primary" id="askBtn" disabled>发送</button>
            </div>
            <div class="quick-questions" id="quickQuestions" style="margin-top: 8px;"></div>
        </div>

        <div class="footer">
            RAG架构 · FastAPI + FAISS + LLM · 车辆工程 + AI
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const uploadStatus = document.getElementById('uploadStatus');
        const uploadMsg = document.getElementById('uploadMsg');
        const uploadSpinner = document.getElementById('uploadSpinner');
        const indexBadge = document.getElementById('indexBadge');
        const chunkBadge = document.getElementById('chunkBadge');
        const chatBox = document.getElementById('chatBox');
        const queryInput = document.getElementById('queryInput');
        const askBtn = document.getElementById('askBtn');

        let indexLoaded = false;

        // ---- 上传 ----
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                fileInput.files = e.dataTransfer.files;
                handleFile(e.dataTransfer.files[0]);
            }
        });
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
        });

        async function handleFile(file) {
            if (!file.name.endsWith('.pdf')) {
                showStatus('error', '请选择 PDF 文件');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            showStatus('loading', '正在上传并处理 PDF...');
            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();
                if (res.ok) {
                    showStatus('success', `✅ 处理完成！共 ${data.chunks} 个文本块`);
                    indexLoaded = true;
                    indexBadge.style.display = 'inline-flex';
                    chunkBadge.style.display = 'inline-flex';
                    chunkBadge.textContent = `📝 ${data.chunks} 个文本块`;
                    queryInput.disabled = false;
                    askBtn.disabled = false;
                    enableQuickQuestions();
                } else {
                    showStatus('error', '❌ ' + (data.detail || '上传失败'));
                }
            } catch (err) {
                showStatus('error', '❌ 网络错误，请检查服务是否在运行');
            }
        }

        function showStatus(type, msg) {
            uploadStatus.className = 'status-bar ' + type;
            uploadSpinner.style.display = type === 'loading' ? 'inline-block' : 'none';
            uploadMsg.textContent = msg;
            uploadStatus.style.display = 'flex';
            if (type !== 'loading') {
                setTimeout(() => { uploadStatus.style.display = 'none'; }, 4000);
            }
        }

        // ---- 提问 ----
        async function askQuestion() {
            const query = queryInput.value.trim();
            if (!query) return;

            addMessage('user', query);
            queryInput.value = '';
            askBtn.disabled = true;
            queryInput.disabled = true;

            const loadingMsg = addMessage('ai', '🤔 正在检索资料并生成回答...');

            try {
                const res = await fetch('/ask?query=' + encodeURIComponent(query));
                const data = await res.json();
                chatBox.removeChild(loadingMsg);

                if (res.ok) {
                    let answerHtml = data.answer.replace(/\n/g, '<br>');
                    if (data.references && data.references.length > 0) {
                        answerHtml += '<br><br><span class="ref-link" onclick="scrollToRef(this)">📎 查看参考资料</span>';
                        answerHtml += '<div style="margin-top:8px; padding:8px; background:#f5f5f5; border-radius:6px; font-size:12px; color:#666;">';
                        data.references.forEach((r, i) => {
                            answerHtml += `<div style="margin-bottom:4px;"><b>片段 ${i+1}</b> (相似度: ${(r.score*100).toFixed(0)}%) ${r.chunk}</div>`;
                        });
                        answerHtml += '</div>';
                    }
                    addMessage('ai', answerHtml);
                } else {
                    chatBox.removeChild(loadingMsg);
                    addMessage('ai', '❌ 错误：' + (data.detail || '提问失败'));
                }
            } catch (err) {
                chatBox.removeChild(loadingMsg);
                addMessage('ai', '❌ 网络错误，请检查服务是否在运行');
            }

            askBtn.disabled = false;
            queryInput.disabled = false;
            queryInput.focus();
        }

        function addMessage(role, content) {
            const empty = chatBox.querySelector('.empty');
            if (empty) chatBox.removeChild(empty);

            const div = document.createElement('div');
            div.className = 'msg ' + role;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = content;
            div.appendChild(bubble);
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        askBtn.addEventListener('click', askQuestion);
        queryInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') askQuestion();
        });

        // ---- 快捷提问 ----
        async function enableQuickQuestions() {
            const container = document.getElementById('quickQuestions');
            container.innerHTML = '<span style="font-size:12px;color:#999;">加载中...</span>';
            try {
                const res = await fetch('/api/suggest-questions');
                const data = await res.json();
                container.innerHTML = '';
                if (data.questions && data.questions.length > 0) {
                    data.questions.forEach(q => {
                        const chip = document.createElement('span');
                        chip.className = 'chip';
                        chip.textContent = q;
                        chip.addEventListener('click', () => {
                            queryInput.value = q;
                            askQuestion();
                        });
                        container.appendChild(chip);
                    });
                } else {
                    container.innerHTML = '<span style="font-size:12px;color:#999;">未检测到相关问题</span>';
                }
            } catch(e) {
                container.innerHTML = '';
            }
        }

        // ---- 检查初始状态 ----
        async function checkStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                if (data.index_loaded) {
                    indexLoaded = true;
                    indexBadge.style.display = 'inline-flex';
                    chunkBadge.style.display = 'inline-flex';
                    chunkBadge.textContent = `📝 ${data.chunks_count} 个文本块`;
                    queryInput.disabled = false;
                    askBtn.disabled = false;
                    enableQuickQuestions();
                }
            } catch(e) {}
        }
        checkStatus();
    </script>
</body>
</html>
